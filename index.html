<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
        <title>Student Admission Form</title>
        <link rel = "stylesheet" href = "styles.css">
    </head>
    <body>
        <header>
            <h1>Student Admission Form</h1>
        </header>
        <main>
            <h1>Welcome to the Student Admission Form</h1>
            <p>Please fill out the form below to apply for admission.</p>

            <div class = "form-container">
                <form action = "emailcreator.php" method = "POST">
                    <label for = "firstName">First Name:</label>
                    <input type = "text" id = "firstName" name = "firstName" required>

                    <label for = "lastName">Last Name:</label>
                    <input type = "text" id = "lastName" name = "lastName" required>

                    <label for = "dateOfBirth">Date of Birth:</label>
                    <input type = 'date' id = "dateOfBirth" name = "dateOfBirth" required>

                    <label for = "department">Department:</label>
                    <select id = "department" name = "department" required>
                        <option value = "Computer Science">Computer Science</option>
                        <option value = "Mathematics">Psychology</option>
                        <option value = "Physics">Business Administration</option>
                        <option value = "Chemistry">Chemistry</option>
                    </select>

                    <button type = "submit">Submit</button>
                </form>
            </div>
            
        </main>
    </body>
</html>
